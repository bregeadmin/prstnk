# ============================================================
# PRSTNK — конфиг визуальной админки (Sveltia / Decap CMS)
# Управляет данными в data/artworks, data/artists, data/collections.
# После сохранения изменения коммитятся в GitHub. Чтобы страницы
# пересобрались — нужно запустить build.py (вручную или через Action).
# ============================================================

backend:
  name: github
  repo: bregeadmin/prstnk      # <-- замените на свой, если репозиторий переименуете
  branch: main
  # base_url — адрес «пропускного пункта» (Cloudflare Worker sveltia-cms-auth).
  # Пока стоит заглушка. Заменить на свой адрес воркера после его запуска
  # (вида https://sveltia-cms-auth.ВАШ-СУБДОМЕН.workers.dev). См. README → «Запуск админки».
  base_url: https://sveltia-cms-auth.grinbergartgroup.workers.dev

# Куда CMS загружает фотографии работ
media_folder: "images/works"
public_folder: "images/works"

# Локаль интерфейса
locale: "ru"

collections:
  # ─────────────────────────────────────────────
  # РАБОТЫ
  # ─────────────────────────────────────────────
  - name: "artworks"
    label: "Работы"
    label_singular: "Работа"
    folder: "data/artworks"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — {{artistName}} ({{status}})"
    sortable_fields: ["order", "title", "price", "year"]
    fields:
      # ── Главное (то, что заполняет человек) ──
      - { name: "mainImage", label: "📷 Фото работы", widget: "image", required: false, hint: "Скан или фотография листа. Пока пусто — показывается графическая заглушка." }
      - name: "orientation"
        label: "Ориентация файла"
        widget: "select"
        required: false
        default: "vertical"
        hint: "Если фото горизонтальное — поставьте «горизонтальная», иначе края обрежутся."
        options:
          - { label: "Вертикальная", value: "vertical" }
          - { label: "Горизонтальная", value: "horizontal" }
      - { name: "title", label: "Название", widget: "string" }
      - name: "artistId"
        label: "Художник"
        widget: "relation"
        collection: "artists"
        value_field: "id"
        search_fields: ["name"]
        display_fields: ["name"]
        hint: "Выберите из списка — имя автора подставится само."
      - { name: "price", label: "Цена, ₽", widget: "number", value_type: "int", min: 0 }
      - name: "status"
        label: "Статус"
        widget: "select"
        default: "available"
        options:
          - { label: "В наличии", value: "available" }
          - { label: "Забронирована", value: "reserved" }
          - { label: "Продана", value: "sold" }
      - name: "workType"
        label: "Тип работы"
        widget: "select"
        default: "editioned"
        options:
          - { label: "Тиражная (несколько экземпляров)", value: "editioned" }
          - { label: "Уникальная (1 из 1)", value: "unique" }

      # ── Тираж (только если работа тиражная; для уникальной — пропустить) ──
      - { name: "editionTotal", label: "Тираж — всего экземпляров", widget: "number", value_type: "int", required: false, min: 1, hint: "Напр. 30. Для уникальной — оставьте пустым." }
      - { name: "editionNumber", label: "Тираж — номер этого экземпляра", widget: "number", value_type: "int", required: false, min: 1, hint: "Напр. 14." }
      - { name: "availableCount", label: "Тираж — сколько ещё доступно", widget: "number", value_type: "int", required: false, min: 0, hint: "Если 1 — покажется «Последний экземпляр»." }
      - { name: "editionClosed", label: "Тираж закрыт (больше не печатается)", widget: "boolean", required: false, default: false }

      # ── О работе ──
      - { name: "year", label: "Год", widget: "number", value_type: "int", min: 1900, max: 2100 }
      - { name: "technique", label: "Техника", widget: "string", hint: "Напр. литография в три камня" }
      - name: "techniqueGroup"
        label: "Раздел каталога"
        widget: "select"
        options:
          - { label: "Литография", value: "lithography" }
          - { label: "Шелкография", value: "silkscreen" }
          - { label: "Линогравюра / ксилография", value: "linocut" }
          - { label: "Офорт", value: "etching" }
          - { label: "Графика и монотипия", value: "graphics" }
      - { name: "sheetSize", label: "Размер листа", widget: "string", hint: "Напр. 40 × 56 см" }
      - { name: "description", label: "Описание работы", widget: "text", required: false, hint: "Пара абзацев для страницы работы. Можно оставить пустым." }
      - { name: "featuredOnHome", label: "Показать на главной странице", widget: "boolean", required: false, default: false }

      # ── Адрес страницы (заполнить латиницей при создании новой работы) ──
      - { name: "slug", label: "Адрес страницы (латиницей)", widget: "string", hint: "Напр. severnyi-gost — только латинские буквы и дефисы. Из этого собирается ссылка на работу." }

      # ── Служебное: заполняется автоматически при сборке сайта, в форме скрыто ──
      - { name: "id", widget: "hidden" }
      - { name: "shortDescription", widget: "hidden", required: false }
      - { name: "galleryImages", label: "Доп. фото (необязательно)", widget: "list", required: false, field: { name: "image", label: "Фото", widget: "image" } }
      - { name: "uniquenessNote", widget: "hidden", required: false }
      - { name: "artistProofs", widget: "hidden", required: false, default: 0 }
      - { name: "imageSize", label: "Размер изображения", widget: "string", required: false, hint: "Пусто — не показываем" }
      - { name: "paper", label: "Бумага", widget: "string", required: false, hint: "Напр. Hahnemühle 300 г/м². Пусто — не показываем" }
      - { name: "signature", label: "Подпись", widget: "string", required: false, hint: "Пусто — не показываем" }
      - { name: "condition", label: "Состояние", widget: "string", required: false, hint: "Пусто — не показываем" }
      - { name: "certificate", label: "Сертификат", widget: "string", required: false, hint: "Пусто — не показываем" }
      - name: "specs"
        label: "Доп. характеристики (свои строки)"
        widget: "list"
        required: false
        label_singular: "характеристика"
        summary: "{{fields.label}}: {{fields.value}}"
        fields:
          - { name: "label", label: "Название", widget: "string" }
          - { name: "value", label: "Значение", widget: "string" }
      - { name: "dominantColor", widget: "hidden", required: false }
      - { name: "alt", widget: "hidden", required: false }
      - { name: "placeholderSvg", widget: "hidden", required: false }
      - { name: "collections", widget: "hidden", required: false }
      - { name: "featuredInCatalog", widget: "hidden", required: false, default: true }
      - { name: "telegramReserveText", widget: "hidden", required: false }
      - { name: "priceFormatted", widget: "hidden", required: false }
      - { name: "seoTitle", widget: "hidden", required: false }
      - { name: "seoDescription", widget: "hidden", required: false }
      - { name: "order", widget: "hidden", required: false, default: 99 }

  # ─────────────────────────────────────────────
  # ХУДОЖНИКИ
  # ─────────────────────────────────────────────
  - name: "artists"
    label: "Художники"
    label_singular: "Художник"
    folder: "data/artists"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} ({{worksCount}} работ)"
    sortable_fields: ["order", "name"]
    fields:
      # ── Главное ──
      - { name: "name", label: "Имя", widget: "string", hint: "Например Пётр Швецов" }
      - { name: "city", label: "Город", widget: "string", default: "Санкт-Петербург" }
      - { name: "birthYear", label: "Год рождения", widget: "number", value_type: "int", required: false }
      - { name: "techniques", label: "Техники", widget: "list", field: { name: "t", label: "Техника", widget: "string" } }
      - { name: "oneLiner", label: "Девиз (одна фраза)", widget: "string", hint: "Короткий портрет автора. Слово можно выделить так: <em>главное</em>" }
      # ── Размещение ──
      - { name: "showInArtists", label: "Показывать в разделе «Художники»", widget: "boolean", default: true, hint: "Включено — художник в общем списке на странице «Художники». Выключите, чтобы временно скрыть черновик." }
      - { name: "featured", label: "Показать на главной странице", widget: "boolean", required: false, default: false, hint: "Включите, чтобы автор попал в блок художников на главной." }
      - { name: "bio", label: "Биография (по абзацу)", widget: "list", field: { name: "p", label: "Абзац", widget: "text" } }
      - { name: "collections", label: "Где увидеть / коллекции", widget: "list", field: { name: "c", label: "Строка", widget: "string" } }
      - name: "meta"
        label: "Мета-карточка (строки под именем)"
        widget: "list"
        required: false
        label_singular: "Строка"
        summary: "{{fields.key}}: {{fields.value}}"
        fields:
          - { name: "key", label: "Подпись (напр. Год рождения)", widget: "string" }
          - { name: "value", label: "Значение (напр. 1958)", widget: "string" }
      # ── Имя в падежах (для кнопок «Работы …») ──
      - { name: "nameShort", label: "Имя кратко", widget: "string", required: false, hint: "Напр. П. Швецов" }
      - { name: "firstName", label: "Имя в родительном падеже", widget: "string", required: false, hint: "Напр. Петра (для «Работы Петра →»)" }
      - { name: "gen", label: "Имя+фамилия в родительном падеже", widget: "string", required: false, hint: "Напр. Петра Швецова" }
      # ── Адрес страницы ──
      - { name: "slug", label: "Адрес страницы (латиницей)", widget: "string", hint: "Напр. shvetsov" }
      # ── Служебное (скрыто) ──
      - { name: "id", widget: "hidden" }
      - { name: "order", widget: "hidden", required: false, default: 99 }
      - { name: "workSlugs", widget: "hidden", required: false }
      - { name: "worksCount", widget: "hidden", required: false }

  # ─────────────────────────────────────────────
  # ПОДБОРКИ
  # ─────────────────────────────────────────────
  - name: "collections"
    label: "Подборки"
    label_singular: "Подборка"
    folder: "data/collections"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Название", widget: "string" }
      - { name: "subtitle", label: "Подзаголовок", widget: "string", required: false }
      - name: "color"
        label: "Цвет плашки"
        widget: "select"
        options:
          - { label: "Алый", value: "alyi" }
          - { label: "Лимон", value: "limon" }
          - { label: "Кобальт", value: "kobalt" }
          - { label: "Хвоя", value: "hvoya" }
          - { label: "Фуксия", value: "fuxia" }
          - { label: "Уголь", value: "ugol" }
      - { name: "description", label: "Описание", widget: "text", required: false }
      - name: "works"
        label: "Работы в подборке"
        widget: "list"
        required: false
        field: { name: "work", label: "Работа", widget: "relation", collection: "artworks", value_field: "slug", search_fields: ["title"], display_fields: ["title"] }
      - { name: "telegramText", label: "Текст в Telegram (если работ нет)", widget: "text", required: false }
      - { name: "slug", label: "Адрес (латиницей)", widget: "string", hint: "Напр. first-wall" }
      - { name: "id", widget: "hidden" }
      - { name: "order", widget: "hidden", required: false, default: 99 }

  # ─────────────────────────────────────────────
  # ЖУРНАЛ — ВЫПУСКИ
  # Каждый выпуск со статьями → отдельная страница zine-<slug>.html.
  # Выпуск без статей показывается тизером (ведёт в Telegram).
  # ─────────────────────────────────────────────
  - name: "issues"
    label: "Журнал — выпуски"
    label_singular: "Выпуск"
    folder: "data/issues"
    extension: "json"
    format: "json"
    create: true
    slug: "{{number}}"
    identifier_field: "title"
    summary: "№ {{number}} · {{period}}"
    sortable_fields: ["order", "number"]
    fields:
      - { name: "number", label: "Номер выпуска", widget: "string", hint: "Шаг 1: заполните номер, период, заголовок и краткое описание. Шаг 2: ниже в блоке «Материалы выпуска» нажмите «Add Статья» и напишите текст. Поля с пометкой «можно пропустить» заполнять не нужно. Напр. номер: 05" }
      - { name: "period", label: "Период", widget: "string", hint: "Напр. лето 2026" }
      - { name: "current", label: "Это текущий выпуск (большой блок наверху журнала)", widget: "boolean", default: false }
      - { name: "title", label: "Заголовок выпуска", widget: "string", hint: "Курсив: <em>слово</em>. Перенос строки: <br/>" }
      - { name: "lead", label: "Краткое описание (карточка в журнале)", widget: "text" }
      - { name: "coverLead", label: "Описание на странице выпуска", widget: "text", required: false, hint: "Если пусто — возьмётся краткое описание выше." }
      - { name: "coverImage", label: "📷 Обложка (необязательно)", widget: "image", required: false, hint: "Если пусто — соберётся аккуратная цветная обложка автоматически." }
      - name: "coverColor"
        label: "Цвет обложки (если без фото)"
        widget: "select"
        default: "alyi"
        options:
          - { label: "Алый", value: "alyi" }
          - { label: "Лимон", value: "limon" }
          - { label: "Кобальт", value: "kobalt" }
          - { label: "Хвоя", value: "hvoya" }
          - { label: "Фуксия", value: "fuxia" }
          - { label: "Уголь", value: "ugol" }
      - { name: "readingTime", label: "Время чтения", widget: "string", required: false, hint: "Напр. 20 мин чтения" }
      - name: "credits"
        label: "Над выпуском работали"
        widget: "list"
        required: false
        summary: "{{fields.role}}: {{fields.name}}"
        fields:
          - { name: "role", label: "Роль", widget: "string", hint: "Напр. Куратор" }
          - { name: "name", label: "Имя", widget: "string" }
      - name: "articles"
        label: "Материалы выпуска (статьи)"
        label_singular: "Статья"
        widget: "list"
        required: false
        summary: "{{fields.title}}"
        fields:
          - { name: "kicker", label: "Рубрика", widget: "string", hint: "Напр. Интервью" }
          - { name: "readMins", label: "Минут чтения", widget: "number", value_type: "int", required: false }
          - { name: "tocTag", label: "Метка в содержании", widget: "string", required: false, hint: "Напр. Интервью" }
          - { name: "title", label: "Заголовок статьи", widget: "string", hint: "Можно <em>...</em> и <br/>" }
          - { name: "lead", label: "Вводка", widget: "text", required: false }
          - name: "body"
            label: "Текст статьи"
            widget: "markdown"
            buttons: ["bold", "italic", "heading-three", "bulleted-list", "numbered-list", "link"]
            editor_components: []
            hint: "Выделите текст и жмите кнопки: Ж — жирный, «Заголовок» — подзаголовок раздела, списки, ссылка. Enter — новый абзац."
          - name: "pullquote"
            label: "Цитата-врезка — можно пропустить"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { name: "text", label: "Цитата", widget: "text", required: false }
              - { name: "cite", label: "Кто сказал", widget: "string", required: false }
          - name: "picksIntro"
            label: "Текст перед блоком работ — можно пропустить"
            widget: "markdown"
            required: false
            buttons: ["bold", "italic", "heading-three", "bulleted-list", "numbered-list", "link"]
            editor_components: []
          - name: "picks"
            label: "Блок «работы из каталога» — можно пропустить"
            widget: "list"
            required: false
            summary: "{{fields.work}}"
            fields:
              - name: "work"
                label: "Работа"
                widget: "relation"
                collection: "artworks"
                value_field: "slug"
                search_fields: ["title"]
                display_fields: ["title"]
              - { name: "note", label: "Комментарий куратора", widget: "text" }
          - name: "bodyAfter"
            label: "Текст после блока работ — можно пропустить"
            widget: "markdown"
            required: false
            buttons: ["bold", "italic", "heading-three", "bulleted-list", "numbered-list", "link"]
            editor_components: []
          - name: "cta"
            label: "Кнопка-призыв — можно пропустить"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { name: "label", label: "Текст кнопки", widget: "string", required: false }
              - { name: "tgText", label: "Сообщение в Telegram", widget: "text", required: false }
          - name: "artistLink"
            label: "Ссылка на художника — можно пропустить"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { name: "slug", label: "Адрес художника", widget: "string", required: false, hint: "Напр. shvetsov" }
              - { name: "label", label: "Текст ссылки", widget: "string", required: false, hint: "Напр. На страницу Швецова" }
      - { name: "nextIssue", label: "Анонс следующего выпуска", widget: "string", required: false, hint: "Напр. № 05 — лето 2026" }
      - { name: "materialsCount", label: "Счётчик материалов (для карточки)", widget: "number", value_type: "int", required: false, hint: "Если пусто — посчитается по статьям." }
      - { name: "archiveNote", label: "Подпись в архиве — можно пропустить", widget: "string", required: false, hint: "Напр. первый выпуск" }
      - { name: "slug", widget: "hidden", required: false }
      - { name: "tgText", widget: "hidden", required: false }
      - { name: "order", widget: "hidden", required: false, default: 99 }

  # ─────────────────────────────────────────────
  # МАТЕРИАЛЫ (коллекция блоков)
  # ─────────────────────────────────────────────
  - name: "articles"
    label: "Материалы"
    label_singular: "Материал"
    folder: "data/articles"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { name: "title", label: "Заголовок", widget: "string" }
      - { name: "titleEm", label: "Курсивная часть заголовка (необяз.)", widget: "string", required: false }
      - { name: "slug", label: "Адрес (slug, латиницей)", widget: "string" }
      - name: "rubric"
        label: "Рубрика"
        widget: "select"
        options:
          - { label: "Разговоры", value: "razgovory" }
          - { label: "На пальцах", value: "na-paltsakh" }
          - { label: "История", value: "istoriya" }
          - { label: "Как смотреть", value: "kak-smotret" }
      - { name: "lead", label: "Лид", widget: "text" }
      - { name: "cover", label: "Обложка (необяз.)", widget: "image", required: false }
      - { name: "author", label: "Автор", widget: "string", default: "редакция ЁPRST" }
      - { name: "date", label: "Дата", widget: "datetime" }
      - { name: "readMins", label: "Время чтения (мин)", widget: "number", value_type: "int" }
      - { name: "featured", label: "В герои витрины", widget: "boolean", default: false }
      - { name: "order", label: "Порядок", widget: "number", required: false, value_type: "int" }
      - name: "blocks"
        label: "Блоки материала"
        widget: "list"
        types:
          - { label: "Абзац", name: "text", widget: "object", fields: [ { name: "text", label: "Текст", widget: "markdown" } ] }
          - { label: "Подзаголовок", name: "heading", widget: "object", fields: [ { name: "text", label: "Текст", widget: "string" } ] }
          - label: "Фото на всю ширину"
            name: "photo"
            widget: "object"
            fields:
              - { name: "image", label: "Фото", widget: "image" }
              - { name: "caption", label: "Подпись", widget: "string", required: false }
          - label: "Текст + фото рядом"
            name: "split"
            widget: "object"
            fields:
              - { name: "text", label: "Текст", widget: "markdown" }
              - { name: "image", label: "Фото", widget: "image" }
              - { name: "imageSide", label: "Фото слева/справа", widget: "select", options: ["left", "right"], default: "right" }
          - label: "Галерея"
            name: "gallery"
            widget: "object"
            fields: [ { name: "images", label: "Фото", widget: "list", field: { name: "image", widget: "image" } } ]
          - label: "Цитата"
            name: "quote"
            widget: "object"
            fields:
              - { name: "text", label: "Цитата", widget: "text" }
              - { name: "cite", label: "Автор цитаты", widget: "string", required: false }
          - label: "Подборка работ (магазин)"
            name: "picks"
            widget: "object"
            fields:
              - { name: "heading", label: "Заголовок подборки", widget: "string" }
              - { name: "workIds", label: "ID работ из каталога", widget: "list", field: { name: "id", widget: "string" } }
          - label: "Видео / встройка"
            name: "embed"
            widget: "object"
            fields:
              - { name: "provider", label: "Источник", widget: "select", options: ["youtube", "vimeo"] }
              - { name: "url", label: "Ссылка", widget: "string" }
              - { name: "caption", label: "Подпись", widget: "string", required: false }

  # ─────────────────────────────────────────────
  # ЖУРНАЛ — ЛЕНТА ПОСТОВ (между выпусками)
  # ─────────────────────────────────────────────
  - name: "materials"
    label: "Лента"
    label_singular: "Пост"
    folder: "data/materials"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} · {{date}}"
    sortable_fields: ["order", "date"]
    fields:
      - { name: "title", label: "Заголовок", widget: "string" }
      - { name: "excerpt", label: "Короткий текст", widget: "text", required: false, hint: "1–2 строки анонса." }
      - { name: "image", label: "📷 Картинка (необязательно)", widget: "image", required: false, hint: "Если пусто — будет цветная плашка." }
      - name: "color"
        label: "Цвет плашки (если без картинки)"
        widget: "select"
        default: "alyi"
        options:
          - { label: "Алый", value: "alyi" }
          - { label: "Лимон", value: "limon" }
          - { label: "Кобальт", value: "kobalt" }
          - { label: "Хвоя", value: "hvoya" }
          - { label: "Фуксия", value: "fuxia" }
          - { label: "Уголь", value: "ugol" }
      - { name: "url", label: "Ссылка на пост в Telegram", widget: "string", required: false, hint: "Напр. https://t.me/prstnk_store/123. Если пусто — откроется чат." }
      - { name: "tag", label: "Метка", widget: "string", required: false, hint: "Напр. репортаж" }
      - { name: "date", label: "Дата", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { name: "slug", label: "Адрес (латиницей)", widget: "string", hint: "Напр. ofort-shtapakov" }
      - { name: "tgText", label: "Сообщение в чат (если нет ссылки)", widget: "text", required: false, hint: "Откроется при клике, если ссылка не указана." }
      - { name: "order", widget: "hidden", required: false, default: 99 }
