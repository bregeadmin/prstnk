# ============================================================
# PRSTNK — конфиг визуальной админки (Sveltia / Decap CMS)
# Управляет данными в data/artworks, data/artists, data/collections.
# После сохранения изменения коммитятся в GitHub. Чтобы страницы
# пересобрались — нужно запустить build.py (вручную или через Action).
# ============================================================

backend:
  name: github
  repo: bregeadmin/prstnk      # <-- замените на свой, если репозиторий переименуете
  branch: main
  # base_url — адрес «пропускного пункта» (Cloudflare Worker sveltia-cms-auth).
  # Пока стоит заглушка. Заменить на свой адрес воркера после его запуска
  # (вида https://sveltia-cms-auth.ВАШ-СУБДОМЕН.workers.dev). См. README → «Запуск админки».
  base_url: https://sveltia-cms-auth.grinbergartgroup.workers.dev

# Куда CMS загружает фотографии работ
media_folder: "images/works"
public_folder: "images/works"

# Локаль интерфейса
locale: "ru"

collections:
  # ─────────────────────────────────────────────
  # РАБОТЫ
  # ─────────────────────────────────────────────
  - name: "artworks"
    label: "Работы"
    label_singular: "Работа"
    folder: "data/artworks"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — {{artistName}} ({{status}})"
    sortable_fields: ["order", "title", "price", "year"]
    fields:
      # ── Главное (то, что заполняет человек) ──
      - { name: "mainImage", label: "📷 Фото работы", widget: "image", required: false, hint: "Скан или фотография листа. Пока пусто — показывается графическая заглушка." }
      - { name: "title", label: "Название", widget: "string" }
      - name: "artistId"
        label: "Художник"
        widget: "relation"
        collection: "artists"
        value_field: "id"
        search_fields: ["name"]
        display_fields: ["name"]
        hint: "Выберите из списка — имя автора подставится само."
      - { name: "price", label: "Цена, ₽", widget: "number", value_type: "int", min: 0 }
      - name: "status"
        label: "Статус"
        widget: "select"
        default: "available"
        options:
          - { label: "В наличии", value: "available" }
          - { label: "Забронирована", value: "reserved" }
          - { label: "Продана", value: "sold" }
      - name: "workType"
        label: "Тип работы"
        widget: "select"
        default: "editioned"
        options:
          - { label: "Тиражная (несколько экземпляров)", value: "editioned" }
          - { label: "Уникальная (1 из 1)", value: "unique" }

      # ── Тираж (только если работа тиражная; для уникальной — пропустить) ──
      - { name: "editionTotal", label: "Тираж — всего экземпляров", widget: "number", value_type: "int", required: false, min: 1, hint: "Напр. 30. Для уникальной — оставьте пустым." }
      - { name: "editionNumber", label: "Тираж — номер этого экземпляра", widget: "number", value_type: "int", required: false, min: 1, hint: "Напр. 14." }
      - { name: "availableCount", label: "Тираж — сколько ещё доступно", widget: "number", value_type: "int", required: false, min: 0, hint: "Если 1 — покажется «Последний экземпляр»." }
      - { name: "editionClosed", label: "Тираж закрыт (больше не печатается)", widget: "boolean", required: false, default: false }

      # ── О работе ──
      - { name: "year", label: "Год", widget: "number", value_type: "int", min: 1900, max: 2100 }
      - { name: "technique", label: "Техника", widget: "string", hint: "Напр. литография в три камня" }
      - name: "techniqueGroup"
        label: "Раздел каталога"
        widget: "select"
        options:
          - { label: "Литография", value: "lithography" }
          - { label: "Шелкография", value: "silkscreen" }
          - { label: "Линогравюра / ксилография", value: "linocut" }
          - { label: "Офорт", value: "etching" }
          - { label: "Графика и монотипия", value: "graphics" }
      - { name: "sheetSize", label: "Размер листа", widget: "string", hint: "Напр. 40 × 56 см" }
      - { name: "description", label: "Описание работы", widget: "text", required: false, hint: "Пара абзацев для страницы работы. Можно оставить пустым." }
      - { name: "featuredOnHome", label: "Показать на главной странице", widget: "boolean", required: false, default: false }

      # ── Адрес страницы (заполнить латиницей при создании новой работы) ──
      - { name: "slug", label: "Адрес страницы (латиницей)", widget: "string", hint: "Напр. severnyi-gost — только латинские буквы и дефисы. Из этого собирается ссылка на работу." }

      # ── Служебное: заполняется автоматически при сборке сайта, в форме скрыто ──
      - { name: "id", widget: "hidden" }
      - { name: "shortDescription", widget: "hidden", required: false }
      - { name: "galleryImages", label: "Доп. фото (необязательно)", widget: "list", required: false, field: { name: "image", label: "Фото", widget: "image" } }
      - { name: "uniquenessNote", widget: "hidden", required: false }
      - { name: "artistProofs", widget: "hidden", required: false, default: 0 }
      - { name: "imageSize", widget: "hidden", required: false }
      - { name: "paper", widget: "hidden", required: false }
      - { name: "signature", widget: "hidden", required: false }
      - { name: "condition", widget: "hidden", required: false }
      - { name: "certificate", widget: "hidden", required: false }
      - { name: "dominantColor", widget: "hidden", required: false }
      - { name: "alt", widget: "hidden", required: false }
      - { name: "placeholderSvg", widget: "hidden", required: false }
      - { name: "collections", widget: "hidden", required: false }
      - { name: "featuredInCatalog", widget: "hidden", required: false, default: true }
      - { name: "telegramReserveText", widget: "hidden", required: false }
      - { name: "priceFormatted", widget: "hidden", required: false }
      - { name: "seoTitle", widget: "hidden", required: false }
      - { name: "seoDescription", widget: "hidden", required: false }
      - { name: "order", widget: "hidden", required: false, default: 99 }

  # ─────────────────────────────────────────────
  # ХУДОЖНИКИ
  # ─────────────────────────────────────────────
  - name: "artists"
    label: "Художники"
    label_singular: "Художник"
    folder: "data/artists"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} ({{worksCount}} работ)"
    sortable_fields: ["order", "name"]
    fields:
      # ── Главное ──
      - { name: "name", label: "Имя", widget: "string", hint: "Например Пётр Швецов" }
      - { name: "city", label: "Город", widget: "string", default: "Санкт-Петербург" }
      - { name: "birthYear", label: "Год рождения", widget: "number", value_type: "int", required: false }
      - { name: "techniques", label: "Техники", widget: "list", field: { name: "t", label: "Техника", widget: "string" } }
      - { name: "oneLiner", label: "Девиз (одна фраза)", widget: "string", hint: "Короткий портрет автора. Слово можно выделить так: <em>главное</em>" }
      - { name: "bio", label: "Биография (по абзацу)", widget: "list", field: { name: "p", label: "Абзац", widget: "text" } }
      - { name: "collections", label: "Где увидеть / коллекции", widget: "list", field: { name: "c", label: "Строка", widget: "string" } }
      - name: "meta"
        label: "Мета-карточка (строки под именем)"
        widget: "list"
        required: false
        label_singular: "Строка"
        summary: "{{fields.key}}: {{fields.value}}"
        fields:
          - { name: "key", label: "Подпись (напр. Год рождения)", widget: "string" }
          - { name: "value", label: "Значение (напр. 1958)", widget: "string" }
      # ── Имя в падежах (для кнопок «Работы …») ──
      - { name: "nameShort", label: "Имя кратко", widget: "string", required: false, hint: "Напр. П. Швецов" }
      - { name: "firstName", label: "Имя в родительном падеже", widget: "string", required: false, hint: "Напр. Петра (для «Работы Петра →»)" }
      - { name: "gen", label: "Имя+фамилия в родительном падеже", widget: "string", required: false, hint: "Напр. Петра Швецова" }
      # ── Адрес страницы ──
      - { name: "slug", label: "Адрес страницы (латиницей)", widget: "string", hint: "Напр. shvetsov" }
      # ── Служебное (скрыто) ──
      - { name: "id", widget: "hidden" }
      - { name: "featured", widget: "hidden", required: false, default: false }
      - { name: "order", widget: "hidden", required: false, default: 99 }
      - { name: "workSlugs", widget: "hidden", required: false }
      - { name: "worksCount", widget: "hidden", required: false }

  # ─────────────────────────────────────────────
  # ПОДБОРКИ
  # ─────────────────────────────────────────────
  - name: "collections"
    label: "Подборки"
    label_singular: "Подборка"
    folder: "data/collections"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}}"
    fields:
      - { name: "title", label: "Название", widget: "string" }
      - { name: "subtitle", label: "Подзаголовок", widget: "string", required: false }
      - name: "color"
        label: "Цвет плашки"
        widget: "select"
        options:
          - { label: "Алый", value: "alyi" }
          - { label: "Лимон", value: "limon" }
          - { label: "Кобальт", value: "kobalt" }
          - { label: "Хвоя", value: "hvoya" }
          - { label: "Фуксия", value: "fuxia" }
          - { label: "Уголь", value: "ugol" }
      - { name: "description", label: "Описание", widget: "text", required: false }
      - { name: "telegramText", label: "Текст в Telegram", widget: "text", required: false }
      - { name: "slug", label: "Адрес (латиницей)", widget: "string", hint: "Напр. first-wall" }
      - { name: "id", widget: "hidden" }
      - { name: "order", widget: "hidden", required: false, default: 99 }
